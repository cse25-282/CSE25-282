<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Sign In</title>

  <style>

    body{
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f5f5f5;
    }

    .container{
      background:white;
      padding:30px;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:15px;
      cursor:pointer;
    }

    .message{
      margin-top:15px;
      font-weight:bold;
    }

  </style>

</head>

<body>

  <div class="container">

    <h2>Sign In</h2>

    <input
      type="email"
      id="email"
      placeholder="Enter email">

    <input
      type="password"
      id="password"
      placeholder="Enter password">

    <button id="loginBtn">
      Login
    </button>

    <p class="message"></p>

  </div>

  <script>

    const loginBtn =
      document.getElementById('loginBtn');

    loginBtn.addEventListener('click', () => {

      const email =
        document.getElementById('email').value;

      const password =
        document.getElementById('password').value;

      const message =
        document.querySelector('.message');

      if(
        email === 'admin@gmail.com'
        &&
        password === '123456'
      ){

        message.textContent =
          'Login Successful';

      } else {

        message.textContent =
          'Invalid Credentials';

      }

    });

  </script>

</body>
</html>
